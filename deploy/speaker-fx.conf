# Фильтр-цепочка вывода звука (~/.config/pipewire/pipewire.conf.d/speaker-fx.conf).
# Виртуальный синк speakers_fx: полоса голоса + смягчение верхов, выход на колонки.
# dsd-fme играет в speakers_fx (юнит icom-dsd), физической громкостью по-прежнему
# управляет ползунок дашборда (синк колонок).
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Speaker FX (voice band)"
      media.name = "Speaker FX"
      filter.graph = {
        nodes = [
          # срез инфранизких: гул, рокот, "плюхи" сквелча
          { type = builtin label = bq_highpass name = hp control = { "Freq" = 270.0 "Q" = 0.707 } }
          # мягкий завал верхов (подобие деэмфазиса, не глушит цифровой голос)
          { type = builtin label = bq_highshelf name = shelf control = { "Freq" = 1800.0 "Q" = 0.707 "Gain" = -5.0 } }
          # срез шипения выше полосы голоса
          { type = builtin label = bq_lowpass name = lp control = { "Freq" = 3600.0 "Q" = 0.707 } }
        ]
        links = [
          { output = "hp:Out" input = "shelf:In" }
          { output = "shelf:Out" input = "lp:In" }
        ]
      }
      capture.props = {
        node.name = "speakers_fx"
        media.class = Audio/Sink
        audio.channels = 2
        audio.position = [ FL FR ]
      }
      playback.props = {
        node.name = "speakers_fx.output"
        target.object = "alsa_output.platform-3f00b840.mailbox.stereo-fallback"
        audio.channels = 2
        audio.position = [ FL FR ]
      }
    }
  }
]
